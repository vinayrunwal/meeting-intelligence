# Meeting Intelligence System — NGINX Configuration
# Place this file in /etc/nginx/sites-available/ and symlink to sites-enabled/

server {
    listen 80;
    server_name _;  # Replace with your domain

    # Allow large audio file uploads
    client_max_body_size 500M;

    # Gzip compression for API responses
    gzip on;
    gzip_types application/json;

    # Static file serving (optional, if you build a frontend)
    # location / {
    #     root /var/www/meeting-intelligence/html;
    #     index index.html;
    # }

    # API Endpoints
    location /api/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        
        # Long timeouts for processing large files
        proxy_read_timeout 600s;
        proxy_connect_timeout 60s;
    }

    # SSE Streaming Endpoint - CRITICAL config for real-time progress
    location /api/v1/stream/ {
        proxy_pass http://127.0.0.1:8000;
        
        # Disable buffering to allow events to flow immediately
        proxy_buffering off;
        proxy_cache off;
        chunked_transfer_encoding off;
        
        # Connection management for SSE
        proxy_set_header Connection '';
        proxy_http_version 1.1;
        proxy_read_timeout 7200s;  # Keep stream alive for up to 2 hours
    }
}
